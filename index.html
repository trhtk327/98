<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צ'אט הארי פוטר</title>

<style>
/* כל ה-CSS שלך + התוספות מהשלב הקודם (לא נוגע בזה שוב כדי לא להעמיס כאן) */
</style>
</head>

<body>

<div class="top-header">
  💬 צ'אט אונליין
</div>
  
<div class="app">

<div class="header">💬 צ'אט הארי פוטר</div>

<div class="adminBar" id="adminBar">
  <button onclick="openBanned()">📋 רשימת חסומים</button>
  <button onclick="clearChat()">🧹 נקה צ'אט</button>
  <button onclick="toggleChat()">⛔חסום צ'אט</button>
</div>

<div id="chat"></div>

<div class="input">
  <input id="msg" placeholder="הודעה...">
  <button onclick="sendMessage()">שלח</button>
</div>

<!-- 🔥 חדש -->
<div id="replyPreview"></div>
<div id="reactionBox"></div>

</div>

<!-- מודאל שם -->
<div class="modal" id="nameModal">
  <div class="box">
    <h3>הכנס שם</h3>
    <input id="nameInput">
    <button onclick="saveName()">אישור</button>
  </div>
</div>

<!-- מודאל מידע -->
<div class="modal" id="infoModal">
  <div class="box" id="infoText"></div>
</div>

<!-- רשימת חסומים -->
<div class="modal" id="bannedModal">
  <div class="box">
    <h3>📋 רשימת חסומים</h3>
    <div id="bannedList"></div>
    <button onclick="closeModal('bannedModal')">סגור</button>
  </div>
</div>

<!-- תפריט -->
<div id="menu">
  <div class="menu-item" onclick="deleteMsg()">❌ מחק</div>
  <div class="menu-item" onclick="banUser()">🚫 חסום</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onChildRemoved, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyC1YgGDcl-mv9R7w3ysSrKx8kPf_QuWzEs",
  databaseURL:"https://harry-potter-chat-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

/* ===== משתנים קיימים ===== */
let name = localStorage.getItem("name");
let isAdmin=false;
let selectedKey, selectedUser;

/* ===== 🔥 משתנים חדשים ===== */
let userData = {
  name: localStorage.getItem("name"),
  phone: localStorage.getItem("phone") || "",
  about: localStorage.getItem("about") || ""
};

let replyData = null;

/* ======================= */

if(!name) nameModal.classList.add("active");

window.saveName=()=>{
  const n=nameInput.value.trim();
  if(!n) return;
  name=n;
  localStorage.setItem("name",n);
  nameModal.classList.remove("active");
};

/* ENTER לשליחה */
msg.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    sendMessage();
  }
});

function showInfo(t){
  infoText.innerHTML=t;
  infoModal.classList.add("active");
  setTimeout(()=>infoModal.classList.remove("active"),2000);
}

window.sendMessage=async()=>{
  const text=msg.value;

  if(text==="26117"){
    isAdmin=true;
    adminBar.style.display="flex";
    showInfo("👑 מצב מנהל הופעל");
    msg.value="";
    return;
  }

  const banned=await get(ref(db,"banned/"+name));
  if(banned.exists()){showInfo("🚫 אתה נחסמת על ידי מנהל");return;}

  const blocked=await get(ref(db,"chatBlocked"));
  if(blocked.exists() && !isAdmin){showInfo("⛔ הצ'אט חסום");return;}

  if(!text) return;

  push(ref(db,"messages"),{
    name,
    text,
    time:new Date().toLocaleTimeString().slice(0,5),
    admin:isAdmin
  });

  msg.value="";
};

onChildAdded(ref(db,"messages"), d=>{
  const m=d.val();
  const key=d.key;

  const div=document.createElement("div");
  div.className="msg "+(m.name===name?"me":"other")+(m.admin?" adminMsg":"");

  div.innerHTML=`
    <div class="name">${m.name}${m.admin?" (מנהל)":""}</div>
    <div class="textRow">
      <div class="text">${m.text}</div>
      <div class="time">${m.time}</div>
    </div>
  `;

  div.id=key;

  div.ondblclick=(e)=>{
    if(!isAdmin)return;
    openMenu(e, key, m.name);
  };

  let pressTimer;
  div.ontouchstart=(e)=>{
    pressTimer=setTimeout(()=>{
      if(!isAdmin)return;
      openMenu(e, key, m.name);
    },600);
  };
  div.ontouchend=()=>clearTimeout(pressTimer);

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
});

function openMenu(e,key,user){
  selectedKey=key;
  selectedUser=user;

  const x=e.touches?e.touches[0].clientX:e.clientX;
  const y=e.touches?e.touches[0].clientY:e.clientY;

  menu.style.left=x+"px";
  menu.style.top=y+"px";
  menu.style.display="block";
}

onChildRemoved(ref(db,"messages"), d=>{
  const el=document.getElementById(d.key);
  if(el) el.remove();
});

window.deleteMsg=()=>{
  remove(ref(db,"messages/"+selectedKey));
  menu.style.display="none";
};

window.banUser=()=>{
  set(ref(db,"banned/"+selectedUser),true);
  showInfo("🚫 המשתמש נחסם");
  menu.style.display="none";
};

window.clearChat=()=>{
  set(ref(db,"messages"),null);
  showInfo("🧹 נמחק הכל");
};

window.toggleChat=async()=>{
  const snap=await get(ref(db,"chatBlocked"));
  if(snap.exists()){
    set(ref(db,"chatBlocked"),null);
    showInfo("✅ הצ'אט פתוח");
  }else{
    set(ref(db,"chatBlocked"),true);
    showInfo("⛔ הצ'אט נחסם");
  }
};

onValue(ref(db,"banned"), snap=>{
  let html="";
  snap.forEach(u=>{
    html+=`<div>${u.key} <button onclick="unban('${u.key}')">בטל</button></div>`;
  });
  bannedList.innerHTML=html || "אין חסומים (בישביל לחסום משתמש לחץ פעמיים על ההודעה שלו)";
});

window.openBanned=()=> bannedModal.classList.add("active");

window.unban=(u)=> remove(ref(db,"banned/"+u));

window.closeModal=(id)=> document.getElementById(id).classList.remove("active");

window.onclick=()=> menu.style.display="none";
</script>

</body>
</html>
