<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ❗ לא שיניתי את העיצוב שלך – רק הוספות קטנות */

.replyPreview{
  background:rgba(255,255,255,0.6);
  padding:6px;
  border-radius:8px;
  margin-bottom:5px;
  font-size:12px;
  cursor:pointer;
}

.reactions{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.reaction{
  background:rgba(0,0,0,0.15);
  padding:2px 6px;
  border-radius:10px;
  font-size:11px;
}

.editBox{
  display:flex;
  gap:5px;
}

.editBox input{
  flex:1;
}

.detailsBox{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.detailsTop,.detailsBottom{
  background:rgba(255,255,255,0.7);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ❗ כל הHTML שלך נשאר אותו דבר -->

<script type="module">
/* ❗ משתמש */
let userData = JSON.parse(localStorage.getItem("userData"));
let replyData=null;

/* ===== מודאל משתמש ===== */
window.saveName=()=>{
  const nameVal=nameInput.value.trim();
  const phoneVal=phoneInput.value.trim();
  const aboutVal=aboutInput.value.trim();

  if(!nameVal || !phoneVal){
    showInfo("❗ שם וטלפון חובה");
    return;
  }

  userData={name:nameVal,phone:phoneVal,about:aboutVal};
  localStorage.setItem("userData",JSON.stringify(userData));
  name=nameVal;

  nameModal.classList.remove("active");
};

/* ===== שליחה ===== */
window.sendMessage=async()=>{
  const text=msg.value;
  if(!text)return;

  push(ref(db,"messages"),{
    ...userData,
    text,
    edited:false,
    time:new Date().toLocaleTimeString().slice(0,5),
    fullTime:new Date().toISOString(),
    reply:replyData,
    admin:isAdmin
  });

  replyData=null;
  replyPreview.innerHTML="";
  msg.value="";
};

/* ===== הצגת הודעה ===== */
onChildAdded(ref(db,"messages"), d=>{
  const m=d.val();
  const key=d.key;

  const div=document.createElement("div");
  div.className="msg "+(m.name===name?"me":"other")+(m.admin?" adminMsg":"");

  div.innerHTML=`
  <div class="nameRow">
    <span class="name">${m.name}${m.admin?" (מנהל)":""}</span>
    <span class="dots" onclick="openMsgMenu(event,'${key}','${m.name}')">⋮</span>
  </div>

  ${m.reply ? `<div class="replyPreview" onclick="scrollToMsg('${m.reply.key}')">
    ${m.reply.name}: ${m.reply.text}
  </div>`:""}

  <div class="textRow" id="text-${key}">
    <div class="text">${m.text}</div>
    <div class="time">${m.time}${m.edited?" (ערוך)":""}</div>
  </div>

  <div class="reactions" id="react-${key}"></div>
  `;

  /* ===== SWIPE ===== */
  let startX=0;
  div.ontouchstart=e=>{
    startX=e.touches[0].clientX;

    setTimeout(()=>{
      openReactions(key,e);
    },600);
  };

  div.ontouchend=e=>{
    if(startX - e.changedTouches[0].clientX > 50){
      replyTo(key);
    }
  };

  chat.appendChild(div);
});

/* ===== תפריט ===== */
window.openMsgMenu=(e,key,user)=>{
  selectedKey=key;
  selectedUser=user;

  let html=`<div onclick="showDetails()">📄 פרטים</div>`;
  html+=`<div onclick="replyTo('${key}')">💬 להגיב</div>`;

  if(user===name)
    html+=`<div onclick="editMsg()">✏️ עריכה</div>`;

  if(user===name || isAdmin)
    html+=`<div onclick="deleteMsg()">❌ מחק</div>`;

  if(isAdmin)
    html+=`<div onclick="banUser()">🚫 חסום</div>`;

  menu.innerHTML=html;
  menu.style.display="block";
};

/* ===== פרטים ===== */
window.showDetails=async()=>{
  const m=(await get(ref(db,"messages/"+selectedKey))).val();
  const d=new Date(m.fullTime);

  infoText.innerHTML=`
  <div class="detailsBox">
    <div class="detailsTop">
      <b>${m.text}</b><br>
      🕒 ${d.toLocaleString()}
    </div>

    <div class="detailsBottom">
      👤 ${m.name}<br>
      📞 ${m.phone}<br>
      ${m.about || ""}
    </div>
  </div>
  `;

  infoModal.classList.add("active");
};

/* ===== עריכה ===== */
window.editMsg=async()=>{
  const el=document.getElementById("text-"+selectedKey);
  const m=(await get(ref(db,"messages/"+selectedKey))).val();

  el.innerHTML=`
    <div class="editBox">
      <input id="editInput" value="${m.text}">
      <button onclick="saveEdit('${selectedKey}')">✔</button>
    </div>
  `;
};

window.saveEdit=(key)=>{
  const val=editInput.value;

  set(ref(db,"messages/"+key+"/text"),val);
  set(ref(db,"messages/"+key+"/edited"),true);
};

/* ===== מחיקה ===== */
window.deleteMsg=()=>{
  remove(ref(db,"messages/"+selectedKey));
};

/* ===== תגובה ===== */
window.replyTo=async(key)=>{
  const m=(await get(ref(db,"messages/"+key))).val();

  replyData={
    key,
    name:m.name,
    text:m.text
  };

  replyPreview.innerHTML=`💬 ${m.name}: ${m.text}`;
};

/* ===== ריאקציות ===== */
window.openReactions=(key,e)=>{
  const emojis=["👍","😂","🔥","❤️","😮"];

  reactionBox.innerHTML=emojis.map(em=>
    `<span onclick="react('${key}','${em}')">${em}</span>`
  ).join("");

  reactionBox.style.display="block";
};

window.react=async(key,emoji)=>{
  const rRef=ref(db,"reactions/"+key+"/"+userData.name);

  set(rRef,emoji);
};

/* ===== הצגה ===== */
onValue(ref(db,"reactions"),snap=>{
  snap.forEach(m=>{
    let map={};

    m.forEach(u=>{
      const em=u.val();
      map[em]=(map[em]||0)+1;
    });

    let html="";
    for(let e in map){
      html+=`<span class="reaction">${e} ${map[e]}</span>`;
    }

    const el=document.getElementById("react-"+m.key);
    if(el) el.innerHTML=html;
  });
});
</script>

</body>
</html>
