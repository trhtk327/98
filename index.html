<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צ'אט מתקדם</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  background:#3f5f73;
  overflow:hidden;
}

/* HEADER */
.top-header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#203a43;
  color:#fff;
  font-weight:bold;
}

/* APP */
.app{
  width:95%;
  max-width:500px;
  height:calc(100vh - 80px);
  margin:10px auto;
  background:#e4f1f9;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px;
  margin:6px 0;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  animation:fade .2s;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

.me{background:#6ec1ff;align-self:flex-end}
.other{background:#9cc7e4;align-self:flex-start}

.nameRow{
  display:flex;
  justify-content:space-between;
}

.dots{cursor:pointer}

.replyBox{
  background:rgba(255,255,255,0.6);
  padding:4px;
  border-radius:6px;
  margin-bottom:5px;
  font-size:12px;
}

.textRow{
  display:flex;
  gap:8px;
}

.time{font-size:10px}

.reactions{
  display:flex;
  gap:5px;
  margin-top:5px;
  font-size:12px;
}

.reaction{
  background:rgba(0,0,0,0.1);
  padding:2px 6px;
  border-radius:10px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#cfe8f7;
}
.input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}
.input button{
  padding:10px;
  border:none;
  background:#4da6ff;
  color:#fff;
  border-radius:20px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:320px;
}

.box input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.box button{
  margin-top:10px;
  padding:8px;
  width:100%;
}

/* MENU */
#menu{
  position:fixed;
  background:#fff;
  border-radius:10px;
  padding:8px;
  display:none;
  z-index:999;
}
.menu-item{
  padding:6px;
  cursor:pointer;
}

/* REACTION PICKER */
#reactionBox{
  position:fixed;
  display:none;
  background:#fff;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="top-header">💬 צ'אט אונליין</div>

<div class="app">
<div id="chat"></div>

<div class="input">
  <input id="msg">
  <button onclick="sendMessage()">שלח</button>
</div>
</div>

<!-- USER MODAL -->
<div class="modal" id="nameModal">
  <div class="box">
    <h3>פרטים</h3>
    <input id="nameInput" placeholder="שם">
    <input id="phoneInput" placeholder="טלפון (חובה)">
    <input id="aboutInput" placeholder="עליי (לא חובה)">
    <button onclick="saveUser()">אישור</button>
  </div>
</div>

<!-- INFO MODAL -->
<div class="modal" id="infoModal">
  <div class="box" id="infoText"></div>
</div>

<div id="menu"></div>
<div id="reactionBox"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyC1YgGDcl-mv9R7w3ysSrKx8kPf_QuWzEs",
databaseURL:"https://harry-potter-chat-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

let user = JSON.parse(localStorage.getItem("user"));
let isAdmin=false;
let selectedKey,selectedUser;
let replyData=null;

if(!user) nameModal.classList.add("active");

window.saveUser=()=>{
  const name=nameInput.value.trim();
  const phone=phoneInput.value.trim();
  const about=aboutInput.value.trim();

  if(!name || !phone) return alert("חובה");

  user={name,phone,about};
  localStorage.setItem("user",JSON.stringify(user));
  nameModal.classList.remove("active");
};

msg.addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

window.sendMessage=()=>{
  const text=msg.value;
  if(!text) return;

  push(ref(db,"messages"),{
    ...user,
    text,
    time:new Date().toLocaleTimeString(),
    fullTime:new Date().toISOString(),
    reply:replyData
  });

  replyData=null;
  msg.value="";
};

onChildAdded(ref(db,"messages"),snap=>{
  const m=snap.val();
  const key=snap.key;

  const div=document.createElement("div");
  div.className="msg "+(m.name===user.name?"me":"other");

  div.innerHTML=`
  <div class="nameRow">
    <span>${m.name}</span>
    <span class="dots" onclick="openMenu(event,'${key}','${m.name}')">⋮</span>
  </div>

  ${m.reply ? `<div class="replyBox">${m.reply.name}: ${m.reply.text}</div>`:""}

  <div class="textRow">
    <div>${m.text}</div>
    <div class="time">${m.time}</div>
  </div>

  <div class="reactions" id="react-${key}"></div>
  `;

  let startX=0;

  div.ontouchstart=e=>{
    startX=e.touches[0].clientX;

    setTimeout(()=>{
      openReactions(key,e);
    },600);
  };

  div.ontouchend=e=>{
    if(startX - e.changedTouches[0].clientX > 50){
      replyData={name:m.name,text:m.text,key};
    }
  };

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
});

window.openMenu=(e,key,name)=>{
  e.stopPropagation();
  selectedKey=key;
  selectedUser=name;

  let html=`
  <div class="menu-item" onclick="showDetails()">📄 פרטים</div>
  <div class="menu-item" onclick="replyMsg()">💬 להגיב</div>
  `;

  if(name===user.name)
    html+=`<div class="menu-item" onclick="editMsg()">✏️ עריכה</div>`;

  if(name===user.name || isAdmin)
    html+=`<div class="menu-item" onclick="deleteMsg()">❌ מחק</div>`;

  if(isAdmin)
    html+=`<div class="menu-item" onclick="banUser()">🚫 חסום</div>`;

  menu.innerHTML=html;
  menu.style.left=e.clientX+"px";
  menu.style.top=e.clientY+"px";
  menu.style.display="block";
};

window.replyMsg=async()=>{
  const snap=await get(ref(db,"messages/"+selectedKey));
  const m=snap.val();
  replyData={name:m.name,text:m.text,key:selectedKey};
  menu.style.display="none";
};

window.showDetails=async()=>{
  const snap=await get(ref(db,"messages/"+selectedKey));
  const m=snap.val();
  const d=new Date(m.fullTime);

  infoText.innerHTML=`
  <h3>פרטים</h3>
  <p>${m.text}</p>
  <hr>
  <p>${d.toLocaleString()}</p>
  <hr>
  <p>${m.name}</p>
  <p>${m.phone}</p>
  <p>${m.about||""}</p>
  `;
  infoModal.classList.add("active");
};

window.deleteMsg=()=>{
  remove(ref(db,"messages/"+selectedKey));
  menu.style.display="none";
};

window.openReactions=(key,e)=>{
  const emojis=["👍","😂","🔥","❤️","😮"];

  reactionBox.innerHTML=emojis.map(x=>
    `<span onclick="addReaction('${key}','${x}')">${x}</span>`
  ).join("");

  reactionBox.style.left=e.touches?e.touches[0].clientX+"px":e.clientX+"px";
  reactionBox.style.top=e.touches?e.touches[0].clientY+"px":e.clientY+"px";
  reactionBox.style.display="block";
};

window.addReaction=(key,emoji)=>{
  const r=ref(db,"reactions/"+key+"/"+emoji);
  get(r).then(s=>set(r,(s.val()||0)+1));
  reactionBox.style.display="none";
};

onValue(ref(db,"reactions"),snap=>{
  snap.forEach(m=>{
    let html="";
    m.forEach(e=>{
      html+=`<span class="reaction">${e.key} ${e.val()}</span>`;
    });
    const el=document.getElementById("react-"+m.key);
    if(el) el.innerHTML=html;
  });
});

window.onclick=()=>{
  menu.style.display="none";
  reactionBox.style.display="none";
};
</script>

</body>
</html>
